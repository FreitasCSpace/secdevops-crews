review_all_prs:
  description: >
    You have {pr_count} PRs to review. Each diff is saved to a temp file.

    SKILLS LOADED: You have access to CareSpace security standards via
    the skills system. Apply the carespace-security-auditor checklist
    and carespace-security-standards (OWASP + HIPAA) for every review.

    PR DATA (from pr_entries in inputs):
    {pr_entries}

    DRY RUN: {dry_run}

    FOR EACH PR:

    1. READ THE FULL DIFF using read_file tool.
       Use the diff_path from the PR entry.
       For large files (>500 lines), chunk: read_file(path, 0, 500),
       read_file(path, 500, 500), etc. Read the ENTIRE file.

    2. APPLY the carespace-security-auditor checklist by file type:
       - NestJS (.controller.ts, .service.ts): AuthGuard, RolesGuard, Prisma queries
       - React (.tsx, .ts): XSS, localStorage PHI, hardcoded secrets
       - Flutter (.dart): token storage, https enforcement, certificate bypass
       - Prisma (.prisma): raw queries, mass assignment
       - Docker: secrets in ENV, root user, base image pinning
       - HIPAA: PHI logging, unencrypted storage, missing redaction

    3. For each finding record:
       - Severity: 🔴 Critical / 🟠 High / 🟡 Medium / ⚪ Low
       - File:line reference
       - Issue (one sentence)
       - HIPAA impact (for Critical/High)
       - Specific code fix

    4. Score: Any Critical → BLOCK, Any High → NEEDS CHANGES, else → PASS

    5. IF dry_run is "true":
       Do NOT call post_pr_review_comment.
       Return the full review for all PRs in your final answer.

    6. IF dry_run is "false":
       Call post_pr_review_comment ONCE per PR with markdown:

       ## 🔒 Security Review — [PASS/NEEDS CHANGES/BLOCK]
       **PR:** repo#number — title
       **Reviewer:** CareSpace SecDevOps AI
       **Files reviewed:** N
       ### Security Findings
       #### 🔴 Critical: [Type]
       **File:** path:line
       **Issue:** Description
       **HIPAA Impact:** Why it matters
       **Fix:** code example
       ### Code Quality
       (observations or "✅ Code quality looks good.")
       ---
       *Automated review by CareSpace SecDevOps AI*

    RULES:
    - Read the ENTIRE diff. No shortcuts. No truncation.
    - Only report REAL findings. If clean, say so.
    - Take your time. Thoroughness over speed.
    - Every finding must reference actual code from the diff.

  expected_output: >
    Complete security review per PR with findings, severity, fixes, and score.
  agent: security_reviewer
