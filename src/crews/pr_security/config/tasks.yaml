review_and_post:
  description: >
    You have {pr_count} open PRs to review. The full diffs are below.

    For EACH PR, analyze the diff for:
    1. HIPAA violations (PHI logging, unencrypted storage, missing auth)
    2. OWASP Top 10 (injection, XSS, broken auth, misconfig)
    3. Hardcoded secrets or credentials
    4. Missing input validation
    5. CareSpace-specific: missing AuthGuard, Prisma raw queries, PHI in responses

    For each finding include: severity, file:line, issue, HIPAA impact, fix.

    SEVERITY: Critical (block merge), High (fix before merge), Medium (fix in sprint), Low (backlog)

    DRY RUN MODE: {dry_run}
    If dry_run is "true": do NOT call post_pr_review_comment.
    Just return all findings as your final answer.

    If dry_run is "false": call post_pr_review_comment ONCE per PR
    with a formatted markdown comment.

    PR comment format:
    ## 🔒 Security Review — PASS/NEEDS CHANGES/BLOCK
    **PR:** repo#number — title
    **Files:** N changed
    ### Findings
    (findings or "✅ No security issues found.")
    ---
    *Automated review by CareSpace SecDevOps AI*

    If a PR is clean, post "✅ Security Review — Clean"

    HERE ARE THE PRs TO REVIEW:

    {pr_review_data}

  expected_output: >
    Security findings per PR with severity, file references, and fixes.
  agent: security_reviewer
