review_all_prs:
  description: >
    Review {pr_count} open PRs for security vulnerabilities.

    SKILLS: carespace-security-auditor + carespace-security-standards are loaded.

    DRY RUN: {dry_run}

    PR LIST:
    {pr_entries}

    DELEGATE each PR to the security_reviewer agent with these instructions:

    For PR [repo]#[number] ([title]):
    1. Read the FULL diff at [diff_path] using read_file tool
       (chunk at 500 lines for large files — read ALL chunks)
    2. Apply the carespace-security-auditor checklist by file type
    3. Report findings with severity, file:line, issue, HIPAA impact, fix
    4. Score: BLOCK / NEEDS CHANGES / PASS
    5. If dry_run is "false": call post_pr_review_comment with formatted markdown
       If dry_run is "true": return findings as text

    Comment format for posting:
    ## 🔒 Security Review — [SCORE]
    **PR:** repo#number — title
    **Reviewer:** CareSpace SecDevOps AI
    **Files reviewed:** N
    ### Security Findings
    #### [emoji] [Severity]: [Type]
    **File:** `path:line`
    **Issue:** description
    **HIPAA Impact:** why it matters
    **Fix:** code example
    ### Code Quality
    Notes or "✅ Code quality looks good."
    ---
    *Automated review by CareSpace SecDevOps AI*

    DELEGATE ALL PRs. Do not skip any.

    FOR EACH PR, after completing the review:
    Call write_review_file to save the review as a markdown file:
    - filename: "repo_number.md" (e.g. "carespace-ui_176.md")
    - content: the full formatted review markdown

    After all PRs are reviewed and saved, compile a final summary
    listing each PR with its score and file path.

  expected_output: >
    Summary of all PR reviews with scores and output file paths.
  agent: security_reviewer
  output_file: output/summary.md
